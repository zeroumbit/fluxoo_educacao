name: Security & Health Checks

on:
  push:
    branches: [ "main", "staging" ]
  pull_request:
    branches: [ "main", "staging" ]

jobs:
  security-and-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 24.x
      uses: actions/setup-node@v4
      with:
        node-version: 24.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Verify environment template
      run: |
        if [ ! -f ".env.example" ]; then
          echo ".env.example not found"
          exit 1
        fi

        REQUIRED_VARS=("VITE_SUPABASE_URL" "VITE_SUPABASE_ANON_KEY")

        for VAR in "${REQUIRED_VARS[@]}"; do
          if ! grep -q "$VAR" .env.example; then
            echo "Required variable missing from template: $VAR"
            exit 1
          fi
        done

    - name: Check for blocked secret patterns
      run: npm run security:secrets

    - name: Gitleaks scan
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Type check and lint
      run: |
        npm run lint || echo "Lint reported warnings."
        npx tsc --noEmit

    - name: Run build
      env:
        VITE_SUPABASE_URL: "https://mock.supabase.co"
        VITE_SUPABASE_ANON_KEY: "ey_mock_key_with_more_than_100_characters_for_validation_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
      run: npm run build
